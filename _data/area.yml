meta:
  name: Management
  description: An index and topic collection covering full-stack API management platforms
    — solutions that combine an API gateway, developer portal, analytics, monetization,
    governance, and lifecycle tooling into a unified product. API management platforms
    sit between API providers and consumers, enforcing security and rate limiting
    at the gateway, publishing APIs through developer portals, instrumenting traffic
    for analytics and billing, and supporting design, versioning, deprecation, and
    policy enforcement across the entire API lifecycle. This collection includes commercial
    leaders like Apigee, Kong, MuleSoft Anypoint, IBM API Connect, Axway Amplify,
    Microsoft Azure API Management, AWS API Gateway, and Google Cloud API Gateway,
    alongside open-source platforms like WSO2, Tyk, Gravitee, KrakenD, and 3scale
    by Red Hat, plus modern entrants like Zuplo, APIwiz, Stoplight, and Postman API
    Hub.
  tags:
  - API Management
  - API Lifecycle
  - Developer Portal
  - API Analytics
  - API Governance
  portal: https://apievangelist.com
  github: https://github.com/api-evangelist
  repo: management
